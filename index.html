<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PL Prophet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --text: #16161A;
    --text-muted: #6B6B76;
    --border: #E7E5DF;
    --accent: #4B2E83;
    --accent-soft: #EFEAF8;
    --gold: #B8862E;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .heading{
    font-family:"Space Grotesk", sans-serif;
  }
  header{
    padding:20px 16px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:baseline;
    justify-content:space-between;
  }
  header .word{
    font-size:20px;
    font-weight:600;
    letter-spacing:-0.02em;
  }
  header .word span{ color:var(--accent); }
  header .season{
    font-size:12px;
    color:var(--text-muted);
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:20px 12px 60px;
  }
  .section-title{
    font-size:13px;
    font-weight:600;
    color:var(--text-muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin:8px 8px 10px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  thead th{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--text-muted);
    font-weight:600;
    text-align:right;
    padding:10px 8px;
    border-bottom:1px solid var(--border);
  }
  thead th:first-child, thead th:nth-child(2){ text-align:left; }
  tbody td{
    padding:10px 8px;
    font-size:14px;
    text-align:right;
    border-bottom:1px solid var(--border);
  }
  tbody tr:last-child td{ border-bottom:none; }
  td.rank{
    text-align:left;
    color:var(--text-muted);
    font-variant-numeric:tabular-nums;
    width:24px;
  }
  td.team{
    text-align:left;
    font-weight:500;
  }
  td.pts{
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  tbody td.mp, tbody td.gd{
    color:var(--text-muted);
    font-variant-numeric:tabular-nums;
    display:none;
  }
  @media (min-width:480px){
    tbody td.mp, tbody td.gd,
    thead th.mp, thead th.gd{ display:table-cell; }
  }
  thead th.mp, thead th.gd{ display:none; }
  tr.zone-top td.team{ border-left:3px solid var(--accent); padding-left:5px; }
  tr.zone-relegation td.team{ border-left:3px solid var(--text-muted); padding-left:5px; }
  .note{
    margin-top:16px;
    padding:12px 14px;
    background:var(--accent-soft);
    border-radius:10px;
    font-size:13px;
    color:var(--accent);
    line-height:1.5;
  }
.match{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 14px;
  margin-bottom:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.match .date{
  font-size:11px;
  color:var(--text-muted);
  width:100%;
  margin-bottom:6px;
}
.match .teams{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
  gap:8px;
}
.match .team-name{
  font-size:14px;
  font-weight:500;
  flex:1;
}
.match .team-name.away{ text-align:right; }
.score-input{
  width:32px;
  height:32px;
  text-align:center;
  border:1px solid var(--border);
  border-radius:6px;
  font-size:14px;
  font-variant-numeric:tabular-nums;
}
.score-input:focus{
  outline:none;
  border-color:var(--accent);
}
  .btn-row{ display:flex; gap:8px; margin-top:16px; }
.btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
}
.btn-primary{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.btn-secondary{
  color:var(--text-muted);
}
</style>
</head>
<body>

<header>
  <div class="word heading">PL <span>Prophet</span></div>
  <div class="season">Säsong 25/26</div>
</header>

<main>
  <div class="section-title">Tabell — simulerad</div>
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Lag</th>
        <th class="mp">M</th>
        <th class="gd">MSK</th>
        <th>P</th>
      </tr>
    </thead>
    <tbody id="standings-body">
      <!-- Placeholder-data, ersätts med riktig data i nästa steg -->
    </tbody>
  </table>

<div class="note">
    Tabellen hämtas live från football-data.org.
  </div>

  <div class="section-title" style="margin-top:32px;">Kommande matcher</div>
  <div id="fixtures-list"></div>

  <div class="btn-row">
    <button id="simulate-btn" class="btn btn-primary">Simulera tabell</button>
    <button id="reset-btn" class="btn btn-secondary" style="display:none;">Återställ till verklig tabell</button>
  </div>
</main>

<script>
  let standingsData = [];
  let fixturesData = [];

  function renderStandings(table) {
    const tbody = document.getElementById("standings-body");
    tbody.innerHTML = "";
    table.forEach((row, i) => {
      const tr = document.createElement("tr");
      const rank = i + 1;
      if (rank <= 4) tr.classList.add("zone-top");
      if (rank >= table.length - 2) tr.classList.add("zone-relegation");
      const gd = row.goalDifference;
      tr.innerHTML = `
        <td class="rank">${rank}</td>
        <td class="team">${row.team.name}</td>
        <td class="mp">${row.playedGames}</td>
        <td class="gd">${gd > 0 ? "+" + gd : gd}</td>
        <td class="pts">${row.points}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  async function loadStandings() {
    const tbody = document.getElementById("standings-body");
    try {
      const res = await fetch("/api/standings");
      const data = await res.json();
      standingsData = data.standings.find(s => s.type === "TOTAL").table;
      renderStandings(standingsData);
    } catch (err) {
      tbody.innerHTML = "<tr><td colspan='5' style='padding:16px; text-align:center; color:var(--text-muted);'>Kunde inte hämta tabellen just nu.</td></tr>";
    }
  }

  async function loadFixtures() {
    const list = document.getElementById("fixtures-list");
    try {
      const res = await fetch("/api/fixtures");
      const data = await res.json();
      fixturesData = data.matches.slice(0, 10);

      fixturesData.forEach(match => {
        const date = new Date(match.utcDate);
        const dateStr = date.toLocaleDateString("sv-SE", { weekday: "short", day: "numeric", month: "short", hour: "2-digit", minute: "2-digit" });

        const div = document.createElement("div");
        div.className = "match";
        div.innerHTML = `
          <div class="date">${dateStr}</div>
          <div class="teams">
            <span class="team-name">${match.homeTeam.name}</span>
            <input type="number" min="0" max="20" class="score-input" data-match="${match.id}" data-side="home">
            <span style="color:var(--text-muted);">–</span>
            <input type="number" min="0" max="20" class="score-input" data-match="${match.id}" data-side="away">
            <span class="team-name away">${match.awayTeam.name}</span>
          </div>
        `;
        list.appendChild(div);
      });
    } catch (err) {
      list.innerHTML = "<p style='color:var(--text-muted); font-size:13px;'>Kunde inte hämta matcher just nu.</p>";
    }
  }

  function simulateTable() {
    const simulated = JSON.parse(JSON.stringify(standingsData));

    fixturesData.forEach(match => {
      const homeInput = document.querySelector(`.score-input[data-match="${match.id}"][data-side="home"]`);
      const awayInput = document.querySelector(`.score-input[data-match="${match.id}"][data-side="away"]`);
      if (!homeInput.value || !awayInput.value) return;

      const homeScore = parseInt(homeInput.value);
      const awayScore = parseInt(awayInput.value);

      const homeTeam = simulated.find(t => t.team.name === match.homeTeam.name);
      const awayTeam = simulated.find(t => t.team.name === match.awayTeam.name);
      if (!homeTeam || !awayTeam) return;

      homeTeam.playedGames += 1;
      awayTeam.playedGames += 1;
      homeTeam.goalDifference += (homeScore - awayScore);
      awayTeam.goalDifference += (awayScore - homeScore);

      if (homeScore > awayScore) homeTeam.points += 3;
      else if (awayScore > homeScore) awayTeam.points += 3;
      else { homeTeam.points += 1; awayTeam.points += 1; }
    });

    simulated.sort((a, b) => b.points - a.points || b.goalDifference - a.goalDifference);
    renderStandings(simulated);

    document.getElementById("reset-btn").style.display = "block";
  }

  document.getElementById("simulate-btn").addEventListener("click", simulateTable);
  document.getElementById("reset-btn").addEventListener("click", () => {
    renderStandings(standingsData);
    document.getElementById("reset-btn").style.display = "none";
  });

  loadStandings();
  loadFixtures();
</script>

</body>
</html>
